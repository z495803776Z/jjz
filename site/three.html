<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>三牌占卜 — Night Oracle</title>
<script src="js/tarot-deck.js">




</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="css/styles.css" />
<style>
body{display:flex;flex-direction:column;min-height:100vh}
.page-header{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;gap:16px;padding:16px 32px;background:rgba(5,10,20,.8);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.05)}
.back-link{color:var(--color-muted);font-size:14px;text-decoration:none}.back-link:hover{color:var(--color-text)}
.page-title-sm{font-family:var(--font-display);font-size:18px;color:var(--color-accent)}
.three-scene{flex:1;display:flex;align-items:center;justify-content:center;padding:100px 32px 60px;position:relative;z-index:1}
.three-stage{text-align:center;max-width:800px;width:100%}
.three-stage h1{font-family:var(--font-display);font-size:clamp(28px,4vw,44px);margin:0 0 12px}
.three-stage .subtitle{color:var(--color-muted);margin:0 0 40px;line-height:1.7}
.question-input{width:100%;max-width:480px;padding:16px 20px;border-radius:var(--radius-md);border:1px solid var(--color-border);background:var(--color-surface);color:var(--color-text);font-size:16px;font-family:var(--font-body);outline:none;margin:0 0 24px;transition:border-color .2s ease,box-shadow .2s ease}
.question-input::placeholder{color:rgba(255,255,255,.3)}
.question-input:focus{border-color:rgba(100,210,255,.3);box-shadow:0 0 20px rgba(100,210,255,.1)}
.draw-btn{display:inline-flex;align-items:center;justify-content:center;height:52px;padding:0 32px;border-radius:var(--radius-pill);border:1px solid rgba(255,255,255,.1);background:linear-gradient(90deg,rgba(100,210,255,.18),rgba(160,130,255,.18));color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:transform .2s ease,box-shadow .2s ease}
.draw-btn:hover{transform:translateY(-2px);box-shadow:0 0 28px rgba(100,210,255,.25)}
.draw-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.draw-btn.hidden{display:none}
.question-display{display:none;font-size:14px;color:var(--color-accent-secondary);letter-spacing:.08em;margin:0 0 32px}.question-display.visible{display:block}
.carousel-container{display:none;justify-content:center;align-items:center;margin:0 auto 36px;height:340px;position:relative;width:100%;max-width:400px}
.carousel-container.visible{display:flex}
.carousel-ring{position:relative;width:280px;height:280px}
.carousel-card{position:absolute;width:66px;height:94px;left:50%;top:50%;margin-left:-33px;margin-top:-47px;border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,.1);box-shadow:0 0 12px rgba(100,210,255,.08);transition:opacity .4s ease}
.carousel-card img{width:100%;height:100%;object-fit:cover;border-radius:7px}
.carousel-ring.spinning{animation:ringSpin 2.5s cubic-bezier(.2,.8,.3,1) forwards}
@keyframes ringSpin{0%{transform:rotate(0deg)}60%{transform:rotate(720deg)}100%{transform:rotate(1080deg)}}
.carousel-ring.cutting .carousel-card.upper{animation:cutLift .8s ease-in-out}
.carousel-ring.cutting .carousel-card.lower{animation:cutStay .8s ease-in-out}
@keyframes cutLift{0%{transform:var(--pos)}35%{transform:var(--pos) translateY(-50px) scale(1.06)}65%{transform:var(--pos) translateY(-50px) scale(1.06)}100%{transform:var(--pos)}}
@keyframes cutStay{0%{transform:var(--pos)}35%{transform:var(--pos) translateY(10px) scale(.97)}65%{transform:var(--pos) translateY(10px) scale(.97)}100%{transform:var(--pos)}}
.carousel-card.flying-out{animation:flyOut .7s cubic-bezier(.2,.8,.3,1) forwards;z-index:100}
@keyframes flyOut{0%{transform:var(--pos);opacity:1}100%{transform:translate(0,0) rotate(0deg) scale(2.8);opacity:0}}
.carousel-ring.drawing .carousel-card:not(.flying-out){animation:fadeCards .5s ease forwards}
@keyframes fadeCards{to{opacity:0;transform:var(--pos) scale(.8)}}
.ritual-toolbar{display:none;gap:12px;justify-content:center;margin:0 0 32px}.ritual-toolbar.visible{display:flex}
.ritual-toolbar .draw-btn{font-size:14px;height:46px;padding:0 24px}
.cards-row{display:none;justify-content:center;gap:32px;margin:0 auto 40px;flex-wrap:wrap}.cards-row.visible{display:flex}
.three-card{position:relative;width:160px;height:230px;perspective:1000px;cursor:pointer;transition:transform .3s ease}
.three-card:hover:not(.flipped){transform:translateY(-6px)}
.three-card-inner{position:absolute;inset:0;transition:transform 1s cubic-bezier(.2,.8,.2,1);transform-style:preserve-3d}
.three-card.flipped .three-card-inner{transform:rotateY(180deg)}
.three-card-face{position:absolute;inset:0;border-radius:var(--radius-md);backface-visibility:hidden;overflow:hidden;border:1px solid rgba(255,255,255,.12);box-shadow:0 0 30px rgba(100,210,255,.12)}
.three-card-face img{width:100%;height:100%;object-fit:cover}
.three-card-face-front{transform:rotateY(180deg)}
.position-label{display:block;margin-top:8px;font-size:13px;color:var(--color-accent-secondary);letter-spacing:.12em}
.three-card .click-hint{position:absolute;bottom:-28px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,.35);white-space:nowrap;opacity:0;transition:opacity .3s ease}
.three-card:not(.flipped):hover .click-hint{opacity:1}
.results{display:none;max-width:900px;margin:0 auto}.results.visible{display:block;animation:fadeUp .8s ease forwards}
.results-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:24px;margin:0 0 32px}
.three-result-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:var(--radius-md);padding:24px;text-align:left}
.three-result-card .pos{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--color-accent-secondary);margin:0 0 8px;display:block}
.three-result-card h3{font-family:var(--font-display);font-size:18px;color:var(--color-accent);margin:0 0 4px}
.three-result-card .kw{font-size:12px;letter-spacing:.12em;color:rgba(255,255,255,.4);margin:0 0 14px;display:block}
.three-result-card p{color:var(--color-muted);line-height:1.8;font-size:14px;margin:0}
.results-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn-secondary{display:inline-flex;align-items:center;justify-content:center;height:44px;padding:0 24px;border-radius:var(--radius-pill);border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.03);color:#fff;cursor:pointer;text-decoration:none;font-size:14px;transition:transform .2s ease,box-shadow .2s ease}
.btn-secondary:hover{transform:translateY(-2px);box-shadow:0 0 18px rgba(160,130,255,.18)}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.pile-picker{display:none;flex-direction:column;gap:28px;align-items:center;margin:0 auto 32px;max-width:600px;width:100%}.pile-picker.visible{display:flex}
.pile-row{display:flex;gap:10px;overflow-x:auto;padding:12px 20px;cursor:pointer;border:none;background:transparent;max-width:100%;-webkit-overflow-scrolling:touch;scrollbar-width:none;user-select:none;touch-action:pan-x}

.pile-row::-webkit-scrollbar{display:none}
.pile-card{touch-action:pan-x;width:80px;height:114px;border-radius:8px;overflow:hidden;flex-shrink:0;border:none;box-shadow:none;transition:transform .15s ease}
.pile-card img{width:100%;height:100%;object-fit:cover;pointer-events:none;-webkit-user-drag:none;user-drag:none}

.pile-label{font-size:12px;color:var(--color-accent-secondary);letter-spacing:.12em;margin-bottom:4px}
.pile-hint{font-size:13px;color:var(--color-muted);margin-top:8px;opacity:.6}
.drawn-pile{display:none;flex-wrap:wrap;justify-content:center;gap:12px;margin:0 auto 32px;max-width:500px}.drawn-pile.visible{display:flex}
.drawn-card{width:80px;height:114px;border-radius:8px;overflow:hidden;cursor:pointer;border:1px solid rgba(255,255,255,.1);box-shadow:0 0 12px rgba(100,210,255,.1);transition:transform .2s ease,box-shadow .2s ease;perspective:800px}
.drawn-card:hover{transform:translateY(-4px);box-shadow:0 0 20px rgba(100,210,255,.2)}
.drawn-card-inner{position:relative;width:100%;height:100%;transition:transform .6s cubic-bezier(.2,.8,.2,1);transform-style:preserve-3d}
.drawn-card.flipped .drawn-card-inner{transform:rotateY(180deg)}
.drawn-card-face{position:absolute;inset:0;backface-visibility:hidden}
.drawn-card-face img{width:100%;height:100%;object-fit:cover}
.drawn-card-front{transform:rotateY(180deg)}
.drawn-hint{font-size:13px;color:var(--color-muted);text-align:center;margin-bottom:16px;opacity:.7}
.pile-card.selecting{opacity:.4;pointer-events:none}
.pile-card.selected{animation:cardFly .5s cubic-bezier(.2,.8,.3,1) forwards;z-index:100}
@keyframes cardFly{0%{opacity:1}100%{opacity:0;transform:scale(.3) translateY(-40px)}}

.deep-reading-panel{display:none;max-width:700px;margin:0 auto 24px;background:rgba(160,130,255,.04);border:1px solid rgba(160,130,255,.18);border-radius:var(--radius-md);padding:24px;animation:fadeUp .8s ease forwards}
.deep-reading-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.deep-reading-icon{font-size:20px}
.deep-reading-title{font-family:var(--font-display);font-size:18px;color:var(--color-accent-secondary)}
.deep-reading-tag{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--color-muted);border:1px solid rgba(255,255,255,.1);border-radius:var(--radius-pill);padding:2px 10px;margin-left:auto}
.deep-reading-content{color:var(--color-muted);line-height:1.9;font-size:15px;white-space:pre-wrap}
.deep-reading-loading{color:var(--color-accent);letter-spacing:.15em;font-size:14px;animation:pulse 1.5s ease-in-out infinite;text-align:center;padding:20px 0}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}</style>
</head>
<body>
`n<canvas class="starfield" aria-hidden="true"></canvas>
<header class="page-header">
<a class="back-link" href="index.html">&larr; 返回首页</a>
<span class="page-title-sm">三牌占卜</span>
</header>
<main class="three-scene">
<div class="three-stage">
<h1>过去 · 现在 · 未来</h1>
<p class="subtitle">在心中想一个你最关心的问题，然后洗牌、切牌、抽取三张牌。<br/>它们将分别揭示你的过去脉络、当下处境与未来走向。</p>
<input type="text" class="question-input" id="question" placeholder="例如：我的事业方向该如何选择？" maxlength="200" />
<button class="draw-btn" id="ask-btn">✦ 向宇宙提问 ✦</button>
<div class="question-display" id="question-display"></div>
<div class="carousel-container" id="carousel-container">
<div class="carousel-ring" id="carousel-ring"></div>
</div>
<div class="ritual-toolbar" id="ritual-toolbar">
<button class="draw-btn" id="shuffle-btn">✦ 洗牌</button>
<button class="draw-btn hidden" id="cut-btn">✦ 切牌</button>
<button class="draw-btn hidden" id="reveal-btn">✦ 抽牌</button>
</div>

<div class="pile-picker" id="pile-picker">
<p class="pile-label">选择一堆牌</p>
<div class="pile-row" id="pile-upper"></div>
<div class="pile-row" id="pile-lower"></div>
<p class="pile-hint">左右拖动浏览，点击选牌</p>
</div>
<div class="cards-row" id="cards-row">
<div class="three-card" id="card-0"><div class="three-card-inner"><div class="three-card-face"><img src="assets/images/card_back.png" alt="Card back" /></div><div class="three-card-face three-card-face-front"><img id="face-img-0" src="assets/images/card_face_sample.png" alt="Card 1" /></div></div><span class="position-label">过去</span><span class="click-hint">点击翻牌</span></div>
<div class="three-card" id="card-1"><div class="three-card-inner"><div class="three-card-face"><img src="assets/images/card_back.png" alt="Card back" /></div><div class="three-card-face three-card-face-front"><img id="face-img-1" src="assets/images/card_face_sample.png" alt="Card 2" /></div></div><span class="position-label">现在</span><span class="click-hint">点击翻牌</span></div>
<div class="three-card" id="card-2"><div class="three-card-inner"><div class="three-card-face"><img src="assets/images/card_back.png" alt="Card back" /></div><div class="three-card-face three-card-face-front"><img id="face-img-2" src="assets/images/card_face_sample.png" alt="Card 3" /></div></div><span class="position-label">未来</span><span class="click-hint">点击翻牌</span></div>
</div>
<div class="results" id="results">
<div class="results-grid" id="results-grid"></div>
<div class="results-actions">
<button class="draw-btn" onclick="location.reload()" style="font-size:14px;height:44px;padding:0 24px;">重新占卜</button>
<a class="btn-secondary" href="daily.html">试试今日星牌</a>
<a class="btn-secondary" href="single.html">试试单牌占卜</a>
<a class="btn-secondary" href="index.html">返回首页</a>
</div>
</div>
</div>
</main>
<script type="module">
import{initStarfield}from'./js/starfield.js';
import{autoSaveReading}from'./js/auto-save.js';import{fetchDeepReading,createDeepReadingPanel}from'./js/deep-reading.js';
const canvas=document.querySelector('.starfield');
if(canvas)initStarfield(canvas);

const CAROUSEL_COUNT=12;
const carouselContainer=document.getElementById('carousel-container');
const carouselRing=document.getElementById('carousel-ring');
const askBtn=document.getElementById('ask-btn');
const questionInput=document.getElementById('question');
const questionDisplay=document.getElementById('question-display');
const shuffleBtn=document.getElementById('shuffle-btn');
const cutBtn=document.getElementById('cut-btn');
const revealBtn=document.getElementById('reveal-btn');
const ritualToolbar=document.getElementById('ritual-toolbar');
const cardsRow=document.getElementById('cards-row');
const resultsEl=document.getElementById('results');
const resultsGrid=document.getElementById('results-grid');
let shuffled=[],carouselCards=[],drawnCards=[],flippedCount=0,drawnPickIdx=0,drawnCount=0,userQuestion='';
function shuffleDeck(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function buildCarousel(){carouselRing.innerHTML='';carouselCards=[];const r=110;for(let i=0;i<CAROUSEL_COUNT;i++){const angle=(i/CAROUSEL_COUNT)*360;const rad=(angle*Math.PI)/180;const x=Math.cos(rad)*r;const y=Math.sin(rad)*r;const card=document.createElement('div');card.className='carousel-card'+(angle<180?' upper':' lower');const pos='translate('+x+'px,'+y+'px) rotate('+(angle+90)+'deg)';card.style.transform=pos;card.style.setProperty('--pos',pos);const img=document.createElement('img');img.src='assets/images/card_back.png';img.alt='';card.appendChild(img);carouselRing.appendChild(card);carouselCards.push(card)}}
function getReading(card,pos){
  const base=card.r||card.k.split(' · ')[0];
  const q=questionInput.value.trim();
  if(pos==='past'){
    return '在过去的脉络中，「'+base+'」的能量深刻影响了你走到今天的方式。'+(q?'回溯你提问的「'+q+'」，这个过往的课题需要被重新看见。':'这段过往的经历正在塑造你当下的选择。');
  }else if(pos==='present'){
    return '当下的处境中，「'+base+'」正在提醒你注意眼前的课题。'+(q?'对于你的问题「'+q+'」，这张牌揭示了此刻最关键的真相。':'这是宇宙在此刻给你的最重要讯息。');
  }else{
    return '未来的走向中，「'+base+'」的能量将引导你走向新的可能。'+(q?'就「'+q+'」而言，这个方向值得你去探索和信任。':'带着这份指引前行，未来正在为你展开。');
  }
}

const POSITIONS=['过去','现在','未来'];
const DECK=TAROT_DECK;
askBtn.addEventListener('click',()=>{const q=questionInput.value.trim();if(q){userQuestion=q;questionDisplay.textContent='「'+q+'」';questionDisplay.classList.add('visible')}questionInput.style.display='none';askBtn.style.display='none';carouselContainer.classList.add('visible');ritualToolbar.classList.add('visible');buildCarousel()});
shuffleBtn.addEventListener('click',()=>{shuffleBtn.disabled=true;carouselRing.classList.add('spinning');shuffled=shuffleDeck(DECK);setTimeout(()=>{carouselRing.classList.remove('spinning');buildCarousel();shuffleBtn.classList.add('hidden');cutBtn.classList.remove('hidden')},2600)});
cutBtn.addEventListener('click',()=>{cutBtn.disabled=true;carouselRing.classList.add('cutting');setTimeout(()=>{carouselRing.classList.remove('cutting');showPiles()},900)});
for(let i=0;i<3;i++){document.getElementById('card-'+i).addEventListener('click',function(){if(!cardsRow.classList.contains('visible'))return;if(flippedCount!==i)return;if(this.classList.contains('flipped'))return;this.classList.add('flipped');var fi=document.getElementById('face-img-'+i);if(fi&&drawnCards[i])fi.src=drawnCards[i].img;flippedCount++;if(flippedCount===3)setTimeout(showResults,800)})}
function showResults(){resultsGrid.innerHTML='';for(let i=0;i<3;i++){const card=drawnCards[i];const reading=getReading(card,i);const div=document.createElement('div');div.className='result-card';div.innerHTML='<span class="pos">'+POSITIONS[i]+'</span><h3>'+card.n+'</h3><span class="kw">'+card.k+'</span><p>'+reading+'</p>';resultsGrid.appendChild(div)}autoSaveReading('三牌占卜',userQuestion,drawnCards,POSITIONS,getReading);resultsEl.classList.add('visible');resultsEl.scrollIntoView({behavior:'smooth'});var drC=createDeepReadingPanel(resultsEl);fetchDeepReading('三牌占卜',userQuestion,drawnCards.map(function(c,i){return{name:c.n,keywords:c.k,position:POSITIONS[i],reading:getReading(c,i)}})).then(function(t){drC.textContent=t})}








function showPiles(){
  carouselContainer.classList.remove('visible');
  ritualToolbar.classList.remove('visible');
  var picker=document.getElementById('pile-picker');
  var upperRow=document.getElementById('pile-upper');
  var lowerRow=document.getElementById('pile-lower');
  upperRow.innerHTML='';lowerRow.innerHTML='';
  for(var i=0;i<39;i++){var d=document.createElement('div');d.className='pile-card';d.innerHTML='<img src="assets/images/card_back.png" alt="" draggable="false"/>';d.dataset.index=i;upperRow.appendChild(d)}
  for(var i=39;i<78;i++){var d=document.createElement('div');d.className='pile-card';d.innerHTML='<img src="assets/images/card_back.png" alt="" draggable="false"/>';d.dataset.index=i;lowerRow.appendChild(d)}
  picker.classList.add('visible');
  var label=picker.querySelector('.pile-label');
  var hint=picker.querySelector('.pile-hint');
  label.textContent='已选 0/3';
  hint.textContent='左右拖动浏览，点击选牌';
  drawnCards=[];
  makeDraggable(upperRow);makeDraggable(lowerRow);
}
function makeDraggable(row){
  var isDown=false,startX,startScrollLeft,dragged=false,lastX,lastTime,velocity=0,rafId,animId,targetCard=null;
  row.style.cursor='grab';
  row.addEventListener('pointerdown',function(e){
    isDown=true;dragged=false;
    startX=e.clientX;startScrollLeft=row.scrollLeft;
    lastX=e.clientX;lastTime=Date.now();velocity=0;
    if(animId)cancelAnimationFrame(animId);
    targetCard=e.target.closest('.pile-card');
    row.setPointerCapture(e.pointerId);
    row.style.cursor='grabbing';
    if(targetCard)targetCard.style.transform='scale(0.95)';
  });
  row.addEventListener('pointermove',function(e){
    if(!isDown)return;
    var dx=e.clientX-lastX;var dt=Date.now()-lastTime;
    if(dt>0)velocity=dx/dt;
    lastX=e.clientX;lastTime=Date.now();if(Math.abs(e.clientX-startX)>5)dragged=true;
    if(rafId)cancelAnimationFrame(rafId);
    rafId=requestAnimationFrame(function(){row.scrollLeft=startScrollLeft-(e.clientX-startX)});
  });
  row.addEventListener('pointerup',function(e){
    if(!isDown)return;isDown=false;
    row.style.cursor='grab';
    if(targetCard)targetCard.style.transform='';
    if(!dragged&&targetCard){pickCard(parseInt(targetCard.dataset.index));return}
    var v=velocity*15;
    function step(){if(Math.abs(v)<0.5)return;row.scrollLeft-=v;v*=0.93;animId=requestAnimationFrame(step)}
    step();
  });
  row.addEventListener('pointercancel',function(){isDown=false;row.style.cursor='grab'});
}
var _pickLock=false;
function pickCard(idx){
  if(_pickLock)return;_pickLock=true;
  var card=shuffled[idx]||shuffled[0];
  drawnCards.push(card);
  var picker=document.getElementById('pile-picker');
  var label=picker.querySelector('.pile-label');
  var hint=picker.querySelector('.pile-hint');
  label.textContent='已选 '+drawnCards.length+'/3';
  var allCards=document.querySelectorAll('.pile-card');
  allCards.forEach(function(c){if(parseInt(c.dataset.index)===idx){c.classList.add('selected');setTimeout(function(){c.style.display='none'},300)}});
  if(drawnCards.length>=3){
    hint.textContent='选牌完成';
    setTimeout(function(){
      picker.classList.remove('visible');
      document.getElementById('cards-row').classList.add('visible');
    },600);
  }
  setTimeout(function(){_pickLock=false},500);
}

</script>
</body>
</html>
