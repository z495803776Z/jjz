<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Night Oracle — 让星光解读你的命运</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="css/styles.css" />
    <style>
      .quick-nav{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:50;display:flex;gap:12px;opacity:0;transition:opacity 1.5s ease}
      .quick-nav.visible{opacity:1}
      .quick-nav a{display:inline-flex;align-items:center;height:36px;padding:0 16px;border-radius:var(--radius-pill);border:1px solid rgba(255,255,255,.08);background:rgba(5,10,20,.6);backdrop-filter:blur(8px);color:var(--color-muted);font-size:13px;text-decoration:none;transition:all .2s ease}
      .quick-nav a:hover{border-color:rgba(100,210,255,.25);color:var(--color-text)}
      .ambient-toggle{position:fixed;bottom:24px;right:24px;z-index:50;width:44px;height:44px;border-radius:50%;border:1px solid rgba(255,255,255,.12);background:rgba(5,10,20,.8);backdrop-filter:blur(8px);color:var(--color-muted);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s ease}
      .ambient-toggle:hover{border-color:rgba(100,210,255,.3);color:var(--color-accent)}
      .ambient-toggle.active{border-color:rgba(100,210,255,.4);color:var(--color-accent);box-shadow:0 0 20px rgba(100,210,255,.15)}
    </style>
  </head>
  <body>
    <canvas class="starfield" aria-hidden="true"></canvas>

    <main>
      <!-- Opening Ritual -->
      <section id="opening" class="section opening">
        <div class="opening-scene" id="opening-scene">
          <canvas class="opening-canvas" id="opening-canvas" aria-hidden="true"></canvas>
          <div class="opening-content">
            <h1 class="opening-title">让星光解读你的命运</h1>
            <p class="opening-subtitle">选一张牌，宇宙正在回应你。</p>
            <a class="btn-primary opening-cta" href="breathe.html">开始占卜</a>
          </div>
        </div>
      </section>
    </main>

    <nav class="quick-nav" id="quick-nav">
      <a href="about.html">✴ 关于我们</a>
      <a href="services.html">全部占卜</a>
    </nav>
    <button class="ambient-toggle" id="ambient-toggle" title="开启环境音">♪</button>

    <script src="js/tarot-deck.js"></script>
    <script type="module">
      import { initStarfield } from './js/starfield.js';
      import { initOpening } from './js/opening.js';
      import { initAmbientToggle } from './js/ambient.js';

      const canvas = document.querySelector('.starfield');
      if (canvas) initStarfield(canvas);

      const scene = document.querySelector('#opening-scene');
      if (scene) initOpening(scene);

      // Show quick nav after first animation cycle
      setTimeout(() => {
        document.getElementById('quick-nav').classList.add('visible');
      }, 10000);

      initAmbientToggle(document.getElementById('ambient-toggle'));
    </script>
  </body>
</html>
