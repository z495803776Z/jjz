<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>情感占卜 — Night Oracle</title>
<script src="js/tarot-deck.js">



</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="css/styles.css" />
<style>
body{display:flex;flex-direction:column;min-height:100vh}
.page-header{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;gap:16px;padding:16px 32px;background:rgba(5,10,20,.8);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.05)}
.back-link{color:var(--color-muted);font-size:14px;text-decoration:none}.back-link:hover{color:var(--color-text)}
.page-title-sm{font-family:var(--font-display);font-size:18px;color:var(--color-accent)}
.love-scene{flex:1;display:grid;place-items:center;padding:120px 32px 80px;position:relative;z-index:1}
.love-stage{text-align:center;max-width:600px}
.love-stage h1{font-family:var(--font-display);font-size:clamp(28px,4vw,44px);margin:0 0 12px;background:linear-gradient(135deg,#ff9a9e,#fecfef,#a082ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.love-stage .sub{color:var(--color-muted);margin:0 0 36px;line-height:1.7}
.input-row{display:flex;gap:12px;margin:0 auto 24px;max-width:480px}
.name-input{flex:1;padding:14px 18px;border-radius:var(--radius-md);border:1px solid var(--color-border);background:var(--color-surface);color:var(--color-text);font-size:15px;font-family:var(--font-body);outline:none;transition:border-color .2s ease}
.name-input:focus{border-color:rgba(255,154,158,.4)}
.name-input::placeholder{color:rgba(255,255,255,.3)}
.question-input{width:100%;max-width:480px;padding:16px 20px;border-radius:var(--radius-md);border:1px solid var(--color-border);background:var(--color-surface);color:var(--color-text);font-size:16px;font-family:var(--font-body);outline:none;margin:0 0 24px;transition:border-color .2s ease}
.question-input:focus{border-color:rgba(255,154,158,.4)}
.question-input::placeholder{color:rgba(255,255,255,.3)}
.draw-btn{display:inline-flex;align-items:center;justify-content:center;height:52px;padding:0 32px;border-radius:var(--radius-pill);border:1px solid rgba(255,255,255,.1);background:linear-gradient(90deg,rgba(255,154,158,.2),rgba(160,130,255,.2));color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:transform .2s ease,box-shadow .2s ease}
.draw-btn:hover{transform:translateY(-2px);box-shadow:0 0 28px rgba(255,154,158,.3)}
.draw-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.draw-btn.hidden{display:none}
.carousel-container{display:none;justify-content:center;align-items:center;margin:0 auto 36px;height:340px;position:relative;width:100%;max-width:400px}
.carousel-container.visible{display:flex}
.carousel-ring{position:relative;width:280px;height:280px}
.carousel-card{position:absolute;width:66px;height:94px;left:50%;top:50%;margin-left:-33px;margin-top:-47px;border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,.1);box-shadow:0 0 12px rgba(255,154,158,.1);transition:opacity .4s ease}
.carousel-card img{width:100%;height:100%;object-fit:cover;border-radius:7px}
.carousel-ring.spinning{animation:ringSpin 2.5s cubic-bezier(.2,.8,.3,1) forwards}
@keyframes ringSpin{0%{transform:rotate(0deg)}60%{transform:rotate(720deg)}100%{transform:rotate(1080deg)}}
.carousel-ring.cutting .carousel-card.upper{animation:cutLift .8s ease-in-out}
.carousel-ring.cutting .carousel-card.lower{animation:cutStay .8s ease-in-out}
@keyframes cutLift{0%{transform:var(--pos)}35%{transform:var(--pos) translateY(-50px) scale(1.06)}65%{transform:var(--pos) translateY(-50px) scale(1.06)}100%{transform:var(--pos)}}
@keyframes cutStay{0%{transform:var(--pos)}35%{transform:var(--pos) translateY(10px) scale(.97)}65%{transform:var(--pos) translateY(10px) scale(.97)}100%{transform:var(--pos)}}
.carousel-card.flying-out{animation:flyOut .7s cubic-bezier(.2,.8,.3,1) forwards;z-index:100}
@keyframes flyOut{0%{transform:var(--pos);opacity:1}100%{transform:translate(0,0) rotate(0deg) scale(2.8);opacity:0}}
.carousel-ring.drawing .carousel-card:not(.flying-out){animation:fadeCards .5s ease forwards}
@keyframes fadeCards{to{opacity:0;transform:var(--pos) scale(.8)}}
.ritual-toolbar{display:none;gap:12px;justify-content:center;margin:0 0 32px}.ritual-toolbar.visible{display:flex}
.ritual-toolbar .draw-btn{font-size:14px;height:46px;padding:0 24px}
.card-container{display:none;position:relative;width:200px;height:290px;margin:0 auto 36px;perspective:1000px;cursor:pointer}.card-container.show{display:block}
.card-inner{position:absolute;inset:0;transition:transform 1s cubic-bezier(.2,.8,.2,1);transform-style:preserve-3d}
.card-container.flipped .card-inner{transform:rotateY(180deg)}
.card-face{position:absolute;inset:0;border-radius:var(--radius-md);backface-visibility:hidden;overflow:hidden;border:1px solid rgba(255,255,255,.12);box-shadow:0 0 40px rgba(255,154,158,.15)}
.card-face img{width:100%;height:100%;object-fit:cover}
.card-face-front{transform:rotateY(180deg)}
.result{display:none;max-width:560px;margin:0 auto}.result.visible{display:block;animation:fadeUp .8s ease forwards}
.result h2{font-family:var(--font-display);font-size:28px;margin:0 0 8px;color:#fecfef}
.result .keyword{font-size:13px;letter-spacing:.15em;text-transform:uppercase;color:var(--color-accent-secondary);margin:0 0 20px}
.result .reading-box{background:rgba(255,154,158,.04);border:1px solid rgba(255,154,158,.12);border-radius:var(--radius-md);padding:24px;margin:0 0 24px;text-align:left}
.result .reading-box p{color:var(--color-muted);line-height:1.9;margin:0;font-size:15px}
.result .reading-box .reading-label{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#ff9a9e;margin:0 0 12px;display:block}
.result .names-echo{font-size:14px;color:rgba(255,154,158,.6);font-style:italic;margin:0 0 16px}
.result-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn-secondary{display:inline-flex;align-items:center;justify-content:center;height:44px;padding:0 24px;border-radius:var(--radius-pill);border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.03);color:#fff;cursor:pointer;text-decoration:none;font-size:14px;transition:transform .2s ease,box-shadow .2s ease}
.btn-secondary:hover{transform:translateY(-2px);box-shadow:0 0 18px rgba(255,154,158,.2)}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.pile-picker{display:none;flex-direction:column;gap:28px;align-items:center;margin:0 auto 32px;max-width:600px;width:100%}.pile-picker.visible{display:flex}
.pile-row{display:flex;gap:10px;overflow-x:auto;padding:12px 20px;cursor:pointer;border:none;background:transparent;max-width:100%;-webkit-overflow-scrolling:touch;scrollbar-width:none;user-select:none;touch-action:pan-x}

.pile-row::-webkit-scrollbar{display:none}
.pile-card{touch-action:pan-x;width:80px;height:114px;border-radius:8px;overflow:hidden;flex-shrink:0;border:none;box-shadow:none;transition:transform .15s ease}
.pile-card img{width:100%;height:100%;object-fit:cover;pointer-events:none;-webkit-user-drag:none;user-drag:none}

.pile-label{font-size:12px;color:var(--color-accent-secondary);letter-spacing:.12em;margin-bottom:4px}
.pile-hint{font-size:13px;color:var(--color-muted);margin-top:8px;opacity:.6}
</style>
</head>
<body>
<canvas class="starfield" aria-hidden="true"></canvas>
<header class="page-header">
<a class="back-link" href="index.html">← 返回首页</a>
<span class="page-title-sm">情感占卜</span>
</header>
<main class="love-scene">
<div class="love-stage">
<h1>爱情之星指引你</h1>
<p class="sub">输入你和对方的名字，想一个关于感情的问题，然后抽牌。</p>
<div class="input-row">
<input class="name-input" id="name1" type="text" placeholder="你的名字" maxlength="20" />
<input class="name-input" id="name2" type="text" placeholder="对方的名字（可选）" maxlength="20" />
</div>
<input class="question-input" id="question" type="text" placeholder="例如：我们之间的感情会怎样发展？" maxlength="200" />
<button class="draw-btn" id="ask-btn">✦ 向星空许愿 ✦</button>
<div class="carousel-container" id="carousel-container">
<div class="carousel-ring" id="carousel-ring"></div>
</div>
<div class="ritual-toolbar" id="ritual-toolbar">
<button class="draw-btn" id="shuffle-btn">✦ 洗牌</button>
<button class="draw-btn hidden" id="cut-btn">✦ 切牌</button>
<button class="draw-btn hidden" id="draw-btn">✦ 抽牌</button>
</div>

<div class="pile-picker" id="pile-picker">
<p class="pile-label">选择一堆牌</p>
<div class="pile-row" id="pile-upper"></div>
<div class="pile-row" id="pile-lower"></div>
<p class="pile-hint">左右拖动浏览，点击选牌</p>
</div>
<div class="card-container" id="card-el">
<div class="card-inner">
<div class="card-face"><img src="assets/images/card_back.png" alt="Card back" /></div>
<div class="card-face card-face-front"><img id="card-face-img" src="assets/images/card_face_sample.png" alt="Your card" /></div>
</div>
</div>
<div class="result" id="result">
<div class="names-echo" id="result-names"></div>
<div class="keyword" id="result-keyword"></div>
<h2 id="result-name"></h2>
<div class="reading-box">
<span class="reading-label">✦ 感情解读</span>
<p id="result-reading"></p>
</div>
<div class="result-actions">
<button class="draw-btn" onclick="location.reload()" style="font-size:14px;height:44px;padding:0 24px;">重新抽牌</button>
<a class="btn-secondary" href="single.html">试试单牌占卜</a>
<a class="btn-secondary" href="index.html">返回首页</a>
</div>
</div>
</div>
</main>
<script type="module">
import{initStarfield}from'./js/starfield.js';
const canvas=document.querySelector('.starfield');
if(canvas)initStarfield(canvas);
const CAROUSEL_COUNT=12;
const carouselContainer=document.getElementById('carousel-container');
const carouselRing=document.getElementById('carousel-ring');
const askBtn=document.getElementById('ask-btn');
const shuffleBtn=document.getElementById('shuffle-btn');
const cutBtn=document.getElementById('cut-btn');
const drawBtn=document.getElementById('draw-btn');
const ritualToolbar=document.getElementById('ritual-toolbar');
const cardEl=document.getElementById('card-el');
const resultEl=document.getElementById('result');
let shuffled=[],carouselCards=[];
function shuffleDeck(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function buildCarousel(){carouselRing.innerHTML='';carouselCards=[];const r=110;for(let i=0;i<CAROUSEL_COUNT;i++){const angle=(i/CAROUSEL_COUNT)*360;const rad=(angle*Math.PI)/180;const x=Math.cos(rad)*r;const y=Math.sin(rad)*r;const card=document.createElement('div');card.className='carousel-card'+(angle<180?' upper':' lower');const pos='translate('+x+'px,'+y+'px) rotate('+(angle+90)+'deg)';card.style.transform=pos;card.style.setProperty('--pos',pos);const img=document.createElement('img');img.src='assets/images/card_back.png';img.alt='';card.appendChild(img);carouselRing.appendChild(card);carouselCards.push(card)}}
function getReading(card){return card.r||'这张牌的核心能量与'+card.k.split(' · ')[0]+'共振。带着这份觉察去经营你的感情世界。'}
const DECK=TAROT_DECK;
askBtn.addEventListener('click',()=>{const n1=document.getElementById('name1').value.trim();const n2=document.getElementById('name2').value.trim();if(!n1&&!n2){document.getElementById('name1').focus();return}questionDisplay.textContent=n2?n1+' ♡ '+n2:n1;questionDisplay.classList.add('visible');document.querySelector('.ask-form').style.display='none';carouselContainer.classList.add('visible');ritualToolbar.classList.add('visible');buildCarousel()});
shuffleBtn.addEventListener('click',()=>{shuffleBtn.disabled=true;carouselRing.classList.add('spinning');shuffled=shuffleDeck(DECK);setTimeout(()=>{carouselRing.classList.remove('spinning');buildCarousel();shuffleBtn.classList.add('hidden');cutBtn.classList.remove('hidden')},2600)});
cutBtn.addEventListener('click',()=>{cutBtn.disabled=true;carouselRing.classList.add('cutting');setTimeout(()=>{carouselRing.classList.remove('cutting');showPiles()},900)});



function makeDraggable(row){
  let isDown=false,startX,startScrollLeft,dragged=false,lastX,lastTime,velocity=0,rafId,animId,targetCard=null;
  row.style.cursor='grab';
  row.addEventListener('pointerdown',e=>{
    isDown=true;dragged=false;
    startX=e.clientX;startScrollLeft=row.scrollLeft;
    lastX=e.clientX;lastTime=Date.now();velocity=0;
    if(animId)cancelAnimationFrame(animId);
    targetCard=e.target.closest('.pile-card');
    row.setPointerCapture(e.pointerId);
    row.style.cursor='grabbing';
    if(targetCard)targetCard.style.transform='scale(0.95)';
  });
  row.addEventListener('pointermove',e=>{
    if(!isDown)return;
    const dx=e.clientX-lastX;const dt=Date.now()-lastTime;
    if(dt>0)velocity=dx/dt;
    lastX=e.clientX;lastTime=Date.now();if(Math.abs(e.clientX-startX)>5)dragged=true;
    if(rafId)cancelAnimationFrame(rafId);
    rafId=requestAnimationFrame(()=>{row.scrollLeft=startScrollLeft-(e.clientX-startX)});
  });
  row.addEventListener('pointerup',e=>{
    if(!isDown)return;isDown=false;
    row.style.cursor='grab';
    if(targetCard)targetCard.style.transform='';
    if(!dragged&&targetCard){pickCard(parseInt(targetCard.dataset.index));return}
    let v=velocity*15;
    function step(){if(Math.abs(v)<0.5)return;row.scrollLeft-=v;v*=0.93;animId=requestAnimationFrame(step)}
    step();
  });
  row.addEventListener('pointercancel',()=>{isDown=false;row.style.cursor='grab'});
}
function showPiles(){
  carouselContainer.classList.remove('visible');
  ritualToolbar.classList.remove('visible');
  const picker=document.getElementById('pile-picker');
  const upperRow=document.getElementById('pile-upper');
  const lowerRow=document.getElementById('pile-lower');
  upperRow.innerHTML='';lowerRow.innerHTML='';
  for(let i=0;i<39;i++){const d=document.createElement('div');d.className='pile-card';d.innerHTML='<img src="assets/images/card_back.png" alt="" draggable="false"/>';d.dataset.index=i;upperRow.appendChild(d)}
  for(let i=39;i<78;i++){const d=document.createElement('div');d.className='pile-card';d.innerHTML='<img src="assets/images/card_back.png" alt="" draggable="false"/>';d.dataset.index=i;lowerRow.appendChild(d)}
  picker.classList.add('visible');
  makeDraggable(upperRow);makeDraggable(lowerRow);
}

function pickCard(idx){
  document.getElementById('pile-picker').classList.remove('visible');
  const el=document.getElementById('card-el');
  el.classList.add('show');
  setTimeout(()=>el.classList.add('flipped'),300);
  const card=shuffled[idx]||shuffled[0];
  document.getElementById('card-face-img').src=card.img;
  setTimeout(()=>{
    document.getElementById('result-keyword').textContent=card.k;
    document.getElementById('result-name').textContent=card.n;
    document.getElementById('result-reading').textContent=getReading(card);
    document.getElementById('result').classList.add('visible');
  },1400);
}

</script>
</body>
</html>
