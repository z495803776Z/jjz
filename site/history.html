<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>占卜记录 — Night Oracle</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="css/styles.css" />
<style>
body{display:flex;flex-direction:column;min-height:100vh}
.page-header{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;gap:16px;padding:16px 32px;background:rgba(5,10,20,.8);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.05)}
.back-link{color:var(--color-muted);font-size:14px;text-decoration:none}.back-link:hover{color:var(--color-text)}
.page-title-sm{font-family:var(--font-display);font-size:18px;color:var(--color-accent)}
.history-scene{flex:1;display:flex;flex-direction:column;align-items:center;padding:100px 32px 80px;position:relative;z-index:1;width:100%}
.history-stage{max-width:700px;width:100%;text-align:center}
.history-stage h1{font-family:var(--font-display);font-size:clamp(26px,4vw,40px);margin:0 0 8px}
.history-stage .sub{color:var(--color-muted);margin:0 0 12px;line-height:1.7;font-size:15px}
.history-count{font-size:13px;color:var(--color-accent-secondary);letter-spacing:.1em;margin:0 0 32px}
.history-empty{text-align:center;padding:60px 20px;display:none}
.history-empty .empty-icon{font-size:48px;margin-bottom:16px;opacity:.4}
.history-empty p{color:var(--color-muted);font-size:15px;line-height:1.7}
.history-list{display:grid;gap:16px;text-align:left;width:100%}
.history-card{position:relative;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:var(--radius-md);padding:20px 24px;transition:border-color .2s ease,box-shadow .2s ease}
.history-card:hover{border-color:rgba(100,210,255,.15);box-shadow:0 0 24px rgba(100,210,255,.06)}
.history-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.history-spread{font-family:var(--font-display);font-size:16px;color:var(--color-accent)}
.history-date{font-size:12px;color:var(--color-muted)}
.history-question{font-size:13px;color:var(--color-accent-secondary);margin:0 0 8px;letter-spacing:.05em}
.history-cards{font-size:13px;color:var(--color-muted);line-height:1.6;margin:0 0 12px}
.history-detail-btn{display:inline-flex;align-items:center;height:36px;padding:0 16px;border-radius:var(--radius-pill);border:1px solid rgba(255,255,255,.1);background:rgba(100,210,255,.08);color:var(--color-text);font-size:13px;cursor:pointer;transition:all .2s ease}
.history-detail-btn:hover{background:rgba(100,210,255,.15);border-color:rgba(100,210,255,.25)}
.history-delete-btn{position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:50%;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:var(--color-muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s ease}
.history-delete-btn:hover{border-color:rgba(255,80,80,.3);color:#ff6b6b;background:rgba(255,80,80,.08)}
.history-actions{display:flex;gap:12px;justify-content:center;margin-top:32px}
.btn-secondary{display:inline-flex;align-items:center;height:44px;padding:0 20px;border-radius:var(--radius-pill);border:1px solid rgba(255,255,255,.12);color:var(--color-muted);font-size:14px;text-decoration:none;transition:all .2s ease;cursor:pointer;background:transparent}
.btn-secondary:hover{border-color:rgba(100,210,255,.3);color:var(--color-text)}

/* Detail modal */
.modal-overlay{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);justify-content:center;align-items:center;padding:20px}
.modal-overlay.visible{display:flex}
.modal-content{background:#0a1020;border:1px solid rgba(255,255,255,.1);border-radius:var(--radius-md);max-width:600px;width:100%;max-height:80vh;overflow-y:auto;padding:32px;position:relative}
.modal-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:var(--color-text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:rgba(255,255,255,.1)}
.modal-spread{font-family:var(--font-display);font-size:20px;color:var(--color-accent);margin:0 0 4px}
.modal-date{font-size:13px;color:var(--color-muted);margin:0 0 16px}
.modal-question{font-size:14px;color:var(--color-accent-secondary);letter-spacing:.05em;margin:0 0 20px}
.modal-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius-sm);padding:16px;margin:0 0 12px}
.modal-card .pos{font-size:12px;color:var(--color-accent-secondary);letter-spacing:.1em}
.modal-card h3{font-family:var(--font-display);font-size:16px;color:var(--color-accent);margin:4px 0}
.modal-card .kw{font-size:12px;color:var(--color-muted);margin-bottom:8px}
.modal-card p{font-size:13px;color:var(--color-text);line-height:1.8;margin:0}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<canvas class="starfield" aria-hidden="true"></canvas>
<header class="page-header">
<a class="back-link" href="services.html">← 返回占卜入口</a>
<span class="page-title-sm">占卜记录</span>
</header>
<main class="history-scene">
<div class="history-stage">
<h1>✨ 占卜记录</h1>
<p class="sub">回顾你的每一次星光对话，感受命运的脉络。</p>
<p class="history-count">共 <span id="history-count">0</span> 条记录</p>
<div class="history-empty" id="history-empty">
<div class="empty-icon">🌟</div>
<p>暂无占卜记录<br/>开始你的第一次占卜，让星光为你记录旅程</p>
</div>
<div class="history-list" id="history-list"></div>
<div class="history-actions">
<a class="btn-secondary" href="services.html">✦ 开始占卜</a>
<a class="btn-secondary" href="index.html">返回首页</a>
<button class="btn-secondary" id="clear-btn" style="display:none">清除全部记录</button>
</div>
</div>
</main>
<div class="modal-overlay" id="detail-modal">
<div class="modal-content">
<button class="modal-close" id="modal-close">×</button>
<div id="modal-body"></div>
</div>
</div>
<script type="module">
import{initStarfield}from'./js/starfield.js';
import{getReadings,deleteReading,clearReadings}from'./js/history.js';
initStarfield(document.querySelector('.starfield'));

const readings=getReadings();
const container=document.getElementById('history-list');
const emptyEl=document.getElementById('history-empty');
const countEl=document.getElementById('history-count');
const clearBtn=document.getElementById('clear-btn');
const modal=document.getElementById('detail-modal');
const modalBody=document.getElementById('modal-body');

countEl.textContent=readings.length;
if(readings.length>0) clearBtn.style.display='inline-flex';

if(readings.length===0){
  container.style.display='none';
  emptyEl.style.display='block';
}else{
  emptyEl.style.display='none';
  renderList();
}

function renderList(){
  const all=getReadings();
  countEl.textContent=all.length;
  clearBtn.style.display=all.length>0?'inline-flex':'none';
  if(all.length===0){container.style.display='none';emptyEl.style.display='block';return}
  emptyEl.style.display='none';container.style.display='grid';
  container.innerHTML=all.map(r=>{
    const d=new Date(r.timestamp);
    const ds=d.toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric'});
    const ts=d.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
    const cs=r.cards.map(c=>c.name.split(' ')[0]).join(' \xb7 ');
    return '<div class="history-card" data-id="'+r.id+'">'+
      '<div class="history-header"><span class="history-spread">'+r.spreadName+'</span><span class="history-date">'+ds+' '+ts+'</span></div>'+
      (r.question?'<p class="history-question">「'+r.question+'」</p>':'')+
      '<p class="history-cards">'+cs+'</p>'+
      '<button class="history-detail-btn" data-action="detail" data-id="'+r.id+'">查看完整解读</button>'+
      '<button class="history-delete-btn" data-action="delete" data-id="'+r.id+'">×</button>'+
    '</div>';
  }).join('');
}

container.addEventListener('click',e=>{
  const btn=e.target.closest('[data-action]');
  if(!btn)return;
  const id=btn.dataset.id;
  if(btn.dataset.action==='delete'){deleteReading(id);renderList()}
  if(btn.dataset.action==='detail'){showDetail(id)}
});

clearBtn.addEventListener('click',()=>{if(confirm('确定清除所有占卜记录？')){clearReadings();renderList()}});
document.getElementById('modal-close').addEventListener('click',()=>modal.classList.remove('visible'));
modal.addEventListener('click',e=>{if(e.target===modal)modal.classList.remove('visible')});

function showDetail(id){
  const r=getReadings().find(x=>x.id===id);
  if(!r)return;
  const d=new Date(r.timestamp);
  modalBody.innerHTML=
    '<h2 class="modal-spread">'+r.spreadName+'</h2>'+
    '<p class="modal-date">'+d.toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric'})+' '+d.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})+'</p>'+
    (r.question?'<p class="modal-question">「'+r.question+'」</p>':'')+
    r.cards.map(c=>'<div class="modal-card"><span class="pos">'+c.position+'</span><h3>'+c.name+'</h3><span class="kw">'+c.keywords+'</span><p>'+c.reading+'</p></div>').join('');
  modal.classList.add('visible');
}
</script>
</body>
</html>
