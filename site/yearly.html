<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>年度十二宫 — Night Oracle</title>
<script src="js/tarot-deck.js">




</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="css/styles.css" />
<style>
body{display:flex;flex-direction:column;min-height:100vh}
.page-header{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;gap:16px;padding:16px 32px;background:rgba(5,10,20,.8);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.05)}
.back-link{color:var(--color-muted);font-size:14px;text-decoration:none}.back-link:hover{color:var(--color-text)}
.page-title-sm{font-family:var(--font-display);font-size:18px;color:var(--color-accent)}
.spread-scene{flex:1;display:flex;align-items:center;justify-content:center;padding:100px 32px 80px;position:relative;z-index:1}
.spread-stage{text-align:center;max-width:620px;width:100%}
.spread-stage h1{font-family:var(--font-display);font-size:clamp(26px,4vw,40px);margin:0 0 12px}
.spread-stage .sub{color:var(--color-muted);margin:0 0 36px;line-height:1.7;font-size:15px}



.draw-btn{display:inline-flex;align-items:center;justify-content:center;height:52px;padding:0 32px;border-radius:var(--radius-pill);border:1px solid rgba(255,255,255,.1);background:linear-gradient(90deg,rgba(100,210,255,.18),rgba(160,130,255,.18));color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:transform .2s ease,box-shadow .2s ease}
.draw-btn:hover{transform:translateY(-2px);box-shadow:0 0 28px rgba(100,210,255,.25)}
.draw-btn:disabled{opacity:.5;cursor:not-allowed}
.draw-btn.hidden{display:none}






.question-input{width:100%;max-width:480px;padding:14px 18px;border-radius:var(--radius-md);border:1px solid var(--color-border);background:var(--color-surface);color:var(--color-text);font-size:14px;font-family:var(--font-body);outline:none;display:block;margin:0 auto 16px;text-align:center}
.question-input:focus{border-color:rgba(100,210,255,.3)}
.question-input::placeholder{color:rgba(255,255,255,.3)}
.carousel-container{display:none;justify-content:center;align-items:center;margin:0 auto 32px;height:340px;position:relative;width:100%;max-width:400px}
.carousel-container.visible{display:flex}
.carousel-ring{position:relative;width:280px;height:280px}
.carousel-card{position:absolute;width:66px;height:94px;left:50%;top:50%;margin-left:-33px;margin-top:-47px;border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,.1);box-shadow:0 0 12px rgba(100,210,255,.08);transition:opacity .4s ease}
.carousel-card img{width:100%;height:100%;object-fit:cover;border-radius:7px}
.carousel-ring.spinning{animation:ringSpin 2.5s cubic-bezier(.2,.8,.3,1) forwards}
@keyframes ringSpin{0%{transform:rotate(0deg)}60%{transform:rotate(720deg)}100%{transform:rotate(1080deg)}}
.carousel-ring.cutting .carousel-card.upper{animation:cutLift .8s ease-in-out}
.carousel-ring.cutting .carousel-card.lower{animation:cutStay .8s ease-in-out}
@keyframes cutLift{0%{transform:var(--pos)}35%{transform:var(--pos) translateY(-50px) scale(1.06)}65%{transform:var(--pos) translateY(-50px) scale(1.06)}100%{transform:var(--pos)}}
@keyframes cutStay{0%{transform:var(--pos)}35%{transform:var(--pos) translateY(10px) scale(.97)}65%{transform:var(--pos) translateY(10px) scale(.97)}100%{transform:var(--pos)}}
.carousel-card.flying-out{animation:flyOut .7s cubic-bezier(.2,.8,.3,1) forwards;z-index:100}
@keyframes flyOut{0%{transform:var(--pos);opacity:1}100%{transform:translate(0,0) rotate(0deg) scale(2.8);opacity:0}}
.carousel-ring.drawing .carousel-card:not(.flying-out){animation:fadeCards .5s ease forwards}
@keyframes fadeCards{to{opacity:0;transform:var(--pos) scale(.8)}}
.ritual-toolbar{display:none;gap:12px;justify-content:center;margin:0 0 32px}.ritual-toolbar.visible{display:flex}
.ritual-toolbar .draw-btn{font-size:14px;height:46px;padding:0 24px}
.spread-cards{display:none;flex-wrap:wrap;justify-content:center;gap:16px;max-width:800px;margin:0 auto;padding:16px 0}
.spread-cards.visible{display:flex}
.spread-slot{position:relative;width:100px;height:144px;perspective:800px;cursor:pointer;transition:transform .3s ease}
.spread-slot:hover:not(.flipped){transform:translateY(-4px)}
.spread-slot-inner{position:absolute;inset:0;transition:transform .8s cubic-bezier(.2,.8,.2,1);transform-style:preserve-3d}
.spread-slot.flipped .spread-slot-inner{transform:rotateY(180deg)}
.spread-face{position:absolute;inset:0;border-radius:8px;backface-visibility:hidden;overflow:hidden;border:1px solid rgba(255,255,255,.12);box-shadow:0 0 20px rgba(100,210,255,.1)}
.spread-face img{width:100%;height:100%;object-fit:cover}
.spread-face-front{transform:rotateY(180deg)}
.spread-pos-label{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);font-size:11px;color:var(--color-accent-secondary);white-space:nowrap}
.results{display:none;padding:40px 0;max-width:800px;margin:0 auto;text-align:left}.results.visible{display:block;animation:fadeUp .6s ease}
.results-grid{display:grid;gap:20px}
.result-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:var(--radius-md);padding:20px 24px}
.result-card .pos{display:inline-block;font-size:12px;color:var(--color-accent-secondary);letter-spacing:.1em;margin-bottom:8px}
.result-card h3{font-family:var(--font-display);font-size:18px;color:var(--color-accent);margin:0 0 6px}
.result-card .kw{display:block;font-size:13px;color:var(--color-muted);margin-bottom:10px}
.result-card p{font-size:14px;color:var(--color-text);line-height:1.8;margin:0}
.results-actions{display:flex;gap:12px;justify-content:center;margin-top:32px;flex-wrap:wrap}
.btn-secondary{display:inline-flex;align-items:center;height:44px;padding:0 20px;border-radius:var(--radius-pill);border:1px solid rgba(255,255,255,.12);color:var(--color-muted);font-size:14px;text-decoration:none;transition:all .2s ease}
.btn-secondary:hover{border-color:rgba(100,210,255,.3);color:var(--color-text)}
.question-echo{display:none;font-size:14px;color:var(--color-accent-secondary);letter-spacing:.08em;margin:0 0 24px;text-align:center}
.question-echo.visible{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:600px){.spread-slot{width:80px;height:115px}.result-card{padding:16px}.result-card h3{font-size:16px}}

.spread-cards{display:none!important}
.spread-layout{display:none;position:relative;width:520px;height:520px;margin:0 auto;padding:20px 0}
.spread-layout.visible{display:block}
.spread-layout .spread-slot{position:absolute;width:90px;height:130px}
.spread-layout #slot-0{left:215px;top:-5px}
.spread-layout #slot-1{left:315px;top:22px}
.spread-layout #slot-2{left:388px;top:95px}
.spread-layout #slot-3{left:415px;top:195px}
.spread-layout #slot-4{left:388px;top:295px}
.spread-layout #slot-5{left:315px;top:368px}
.spread-layout #slot-6{left:215px;top:395px}
.spread-layout #slot-7{left:115px;top:368px}
.spread-layout #slot-8{left:42px;top:295px}
.spread-layout #slot-9{left:15px;top:195px}
.spread-layout #slot-10{left:42px;top:95px}
.spread-layout #slot-11{left:115px;top:22px}         /* 十二月 (adjusted) */


.pile-picker{display:none;flex-direction:column;gap:28px;align-items:center;margin:0 auto 32px;max-width:600px;width:100%}.pile-picker.visible{display:flex}
.pile-row{display:flex;gap:10px;overflow-x:auto;padding:12px 20px;cursor:pointer;border:none;background:transparent;max-width:100%;-webkit-overflow-scrolling:touch;scrollbar-width:none;user-select:none;touch-action:pan-x}

.pile-row::-webkit-scrollbar{display:none}
.pile-card{touch-action:pan-x;width:80px;height:114px;border-radius:8px;overflow:hidden;flex-shrink:0;border:none;box-shadow:none;transition:transform .15s ease}
.pile-card img{width:100%;height:100%;object-fit:cover;pointer-events:none;-webkit-user-drag:none;user-drag:none}

.pile-label{font-size:12px;color:var(--color-accent-secondary);letter-spacing:.12em;margin-bottom:4px}
.pile-hint{font-size:13px;color:var(--color-muted);margin-top:8px;opacity:.6}
.drawn-pile{display:none;flex-wrap:wrap;justify-content:center;gap:12px;margin:0 auto 32px;max-width:500px}.drawn-pile.visible{display:flex}
.drawn-card{width:80px;height:114px;border-radius:8px;overflow:hidden;cursor:pointer;border:1px solid rgba(255,255,255,.1);box-shadow:0 0 12px rgba(100,210,255,.1);transition:transform .2s ease,box-shadow .2s ease;perspective:800px}
.drawn-card:hover{transform:translateY(-4px);box-shadow:0 0 20px rgba(100,210,255,.2)}
.drawn-card-inner{position:relative;width:100%;height:100%;transition:transform .6s cubic-bezier(.2,.8,.2,1);transform-style:preserve-3d}
.drawn-card.flipped .drawn-card-inner{transform:rotateY(180deg)}
.drawn-card-face{position:absolute;inset:0;backface-visibility:hidden}
.drawn-card-face img{width:100%;height:100%;object-fit:cover}
.drawn-card-front{transform:rotateY(180deg)}
.drawn-hint{font-size:13px;color:var(--color-muted);text-align:center;margin-bottom:16px;opacity:.7}
.pile-card.selecting{opacity:.4;pointer-events:none}
.pile-card.selected{animation:cardFly .5s cubic-bezier(.2,.8,.3,1) forwards;z-index:100}
@keyframes cardFly{0%{opacity:1}100%{opacity:0;transform:scale(.3) translateY(-40px)}}

.deep-reading-panel{display:none;max-width:700px;margin:0 auto 24px;background:rgba(160,130,255,.04);border:1px solid rgba(160,130,255,.18);border-radius:var(--radius-md);padding:24px;animation:fadeUp .8s ease forwards}
.deep-reading-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.deep-reading-icon{font-size:20px}
.deep-reading-title{font-family:var(--font-display);font-size:18px;color:var(--color-accent-secondary)}
.deep-reading-tag{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--color-muted);border:1px solid rgba(255,255,255,.1);border-radius:var(--radius-pill);padding:2px 10px;margin-left:auto}
.deep-reading-content{color:var(--color-muted);line-height:1.9;font-size:15px;white-space:pre-wrap}
.deep-reading-loading{color:var(--color-accent);letter-spacing:.15em;font-size:14px;animation:pulse 1.5s ease-in-out infinite;text-align:center;padding:20px 0}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}</style>
</head>
<body>
<canvas class="starfield" aria-hidden="true"></canvas>
<header class="page-header">
<a class="back-link" href="services.html">← 返回占卜入口</a>
<span class="page-title-sm">年度十二宫</span>
</header>
<main class="spread-scene">
<div class="spread-stage">
<h1>年度十二宫</h1>
<p class="sub">十二张牌对应十二个月，为你揭示全年各月份的能量走向与关键课题。</p>

<div class="spread-slot" id="slot-2"><div class="spread-slot-inner"><div class="spread-face"><img src="assets/images/card_back.png" alt=""/></div><div class="spread-face spread-face-front"><img id="face-img-2" src="assets/images/card_face_sample.png" alt=""/></div></div><span class="spread-pos-label">三月</span></div>
<div class="spread-slot" id="slot-3"><div class="spread-slot-inner"><div class="spread-face"><img src="assets/images/card_back.png" alt=""/></div><div class="spread-face spread-face-front"><img id="face-img-3" src="assets/images/card_face_sample.png" alt=""/></div></div><span class="spread-pos-label">四月</span></div>
<div class="spread-slot" id="slot-4"><div class="spread-slot-inner"><div class="spread-face"><img src="assets/images/card_back.png" alt=""/></div><div class="spread-face spread-face-front"><img id="face-img-4" src="assets/images/card_face_sample.png" alt=""/></div></div><span class="spread-pos-label">五月</span></div>
<div class="spread-slot" id="slot-5"><div class="spread-slot-inner"><div class="spread-face"><img src="assets/images/card_back.png" alt=""/></div><div class="spread-face spread-face-front"><img id="face-img-5" src="assets/images/card_face_sample.png" alt=""/></div></div><span class="spread-pos-label">六月</span></div>
<div class="spread-slot" id="slot-6"><div class="spread-slot-inner"><div class="spread-face"><img src="assets/images/card_back.png" alt=""/></div><div class="spread-face spread-face-front"><img id="face-img-6" src="assets/images/card_face_sample.png" alt=""/></div></div><span class="spread-pos-label">七月</span></div>
<div class="spread-slot" id="slot-7"><div class="spread-slot-inner"><div class="spread-face"><img src="assets/images/card_back.png" alt=""/></div><div class="spread-face spread-face-front"><img id="face-img-7" src="assets/images/card_face_sample.png" alt=""/></div></div><span class="spread-pos-label">八月</span></div>
<div class="spread-slot" id="slot-8"><div class="spread-slot-inner"><div class="spread-face"><img src="assets/images/card_back.png" alt=""/></div><div class="spread-face spread-face-front"><img id="face-img-8" src="assets/images/card_face_sample.png" alt=""/></div></div><span class="spread-pos-label">九月</span></div>
<div class="spread-slot" id="slot-9"><div class="spread-slot-inner"><div class="spread-face"><img src="assets/images/card_back.png" alt=""/></div><div class="spread-face spread-face-front"><img id="face-img-9" src="assets/images/card_face_sample.png" alt=""/></div></div><span class="spread-pos-label">十月</span></div>

<script type="module">
import{initStarfield}from'./js/starfield.js';
import{autoSaveReading}from'./js/auto-save.js';import{fetchDeepReading,createDeepReadingPanel}from'./js/deep-reading.js';
initStarfield(document.querySelector('.starfield'));

const CAROUSEL_COUNT=12;
const POSITIONS=["一月","二月","三月","四月","五月","六月","七月","八月","九月","十月","十一月","十二月"];
const carouselRing=document.getElementById('carousel-ring');
const carouselContainer=document.getElementById('carousel-container');
const askBtn=document.getElementById('ask-btn');
const questionEl=document.getElementById('question');
const shuffleBtn=document.getElementById('shuffle-btn');
const cutBtn=document.getElementById('cut-btn');
const drawBtn=document.getElementById('draw-btn');
const spreadEl=document.getElementById('spread-cards');
const resultsEl=document.getElementById('results');
const resultsGrid=document.getElementById('results-grid');
const questionEcho=document.getElementById('question-echo');
const ritualToolbar=document.getElementById('ritual-toolbar');

let shuffled=[],carouselCards=[],drawnCards=[],flippedCount=0,drawnPickIdx=0,drawnCount=0,userQuestion='';

function shuffleDeck(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

function buildCarousel(){carouselRing.innerHTML='';carouselCards=[];const r=110;for(let i=0;i<CAROUSEL_COUNT;i++){const angle=(i/CAROUSEL_COUNT)*360;const rad=(angle*Math.PI)/180;const x=Math.cos(rad)*r;const y=Math.sin(rad)*r;const d=document.createElement('div');d.className='carousel-card'+(angle<180?' upper':' lower');const pos='translate('+x+'px,'+y+'px) rotate('+(angle+90)+'deg)';d.style.transform=pos;d.style.setProperty('--pos',pos);d.innerHTML='<img src="assets/images/card_back.png" alt="card" draggable="false"/>';carouselRing.appendChild(d);carouselCards.push(d)}}

const DECK=TAROT_DECK;
function getReading(card,idx){const months=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];const guides=months.map(function(m){return m+'的能量：'+card.k.split(' · ')[0]+'。'+card.n+'指引——'});const endings=['顺应这股能量，把握时机。','让月份的韵律引导你的步伐。','在时光的流转中找到你的节奏。'];return guides[idx]+endings[Math.floor(Math.random()*endings.length)]}
askBtn.addEventListener('click',()=>{const q=questionEl.value.trim();if(!q){questionEl.focus();return}userQuestion=q;questionEcho.textContent='「'+q+'」';questionEcho.classList.add('visible');questionEl.style.display='none';askBtn.style.display='none';carouselContainer.classList.add('visible');ritualToolbar.classList.add('visible');buildCarousel()});
shuffleBtn.addEventListener('click',()=>{shuffleBtn.disabled=true;carouselRing.classList.add('spinning');shuffled=shuffleDeck(DECK);setTimeout(()=>{carouselRing.classList.remove('spinning');buildCarousel();shuffleBtn.classList.add('hidden');cutBtn.classList.remove('hidden')},2600)});
cutBtn.addEventListener('click',()=>{cutBtn.disabled=true;carouselRing.classList.add('cutting');setTimeout(()=>{carouselRing.classList.remove('cutting');showPiles()},900)});
for(let i=0;i<12;i++){document.getElementById('slot-'+i).addEventListener('click',function(){if(!spreadEl.classList.contains('visible'))return;if(flippedCount!==i)return;if(this.classList.contains('flipped'))return;this.classList.add('flipped');var fi=document.getElementById('face-img-'+i);if(fi&&drawnCards[i])fi.src=drawnCards[i].img;flippedCount++;if(flippedCount===12)setTimeout(showResults,800)})}
function showResults(){resultsGrid.innerHTML='';for(let i=0;i<12;i++){const card=drawnCards[i];const reading=getReading(card,i);const div=document.createElement('div');div.className='result-card';div.innerHTML='<span class="pos">'+POSITIONS[i]+'</span><h3>'+card.n+'</h3><span class="kw">'+card.k+'</span><p>'+reading+'</p>';resultsGrid.appendChild(div)}autoSaveReading('年度十二宫',userQuestion,drawnCards,POSITIONS,getReading);resultsEl.classList.add('visible');resultsEl.scrollIntoView({behavior:'smooth'});var drC=createDeepReadingPanel(resultsEl);fetchDeepReading('年度十二宫',userQuestion,drawnCards.map(function(c,i){return{name:c.n,keywords:c.k,position:POSITIONS[i],reading:getReading(c,i)}})).then(function(t){drC.textContent=t})}








function showPiles(){
  carouselContainer.classList.remove('visible');
  ritualToolbar.classList.remove('visible');
  var picker=document.getElementById('pile-picker');
  var upperRow=document.getElementById('pile-upper');
  var lowerRow=document.getElementById('pile-lower');
  upperRow.innerHTML='';lowerRow.innerHTML='';
  for(var i=0;i<39;i++){var d=document.createElement('div');d.className='pile-card';d.innerHTML='<img src="assets/images/card_back.png" alt="" draggable="false"/>';d.dataset.index=i;upperRow.appendChild(d)}
  for(var i=39;i<78;i++){var d=document.createElement('div');d.className='pile-card';d.innerHTML='<img src="assets/images/card_back.png" alt="" draggable="false"/>';d.dataset.index=i;lowerRow.appendChild(d)}
  picker.classList.add('visible');
  var label=picker.querySelector('.pile-label');
  var hint=picker.querySelector('.pile-hint');
  label.textContent='已选 0/12';
  hint.textContent='左右拖动浏览，点击选牌';
  drawnCards=[];
  makeDraggable(upperRow);makeDraggable(lowerRow);
}
function makeDraggable(row){
  var isDown=false,startX,startScrollLeft,dragged=false,lastX,lastTime,velocity=0,rafId,animId,targetCard=null;
  row.style.cursor='grab';
  row.addEventListener('pointerdown',function(e){
    isDown=true;dragged=false;
    startX=e.clientX;startScrollLeft=row.scrollLeft;
    lastX=e.clientX;lastTime=Date.now();velocity=0;
    if(animId)cancelAnimationFrame(animId);
    targetCard=e.target.closest('.pile-card');
    row.setPointerCapture(e.pointerId);
    row.style.cursor='grabbing';
    if(targetCard)targetCard.style.transform='scale(0.95)';
  });
  row.addEventListener('pointermove',function(e){
    if(!isDown)return;
    var dx=e.clientX-lastX;var dt=Date.now()-lastTime;
    if(dt>0)velocity=dx/dt;
    lastX=e.clientX;lastTime=Date.now();if(Math.abs(e.clientX-startX)>5)dragged=true;
    if(rafId)cancelAnimationFrame(rafId);
    rafId=requestAnimationFrame(function(){row.scrollLeft=startScrollLeft-(e.clientX-startX)});
  });
  row.addEventListener('pointerup',function(e){
    if(!isDown)return;isDown=false;
    row.style.cursor='grab';
    if(targetCard)targetCard.style.transform='';
    if(!dragged&&targetCard){pickCard(parseInt(targetCard.dataset.index));return}
    var v=velocity*15;
    function step(){if(Math.abs(v)<0.5)return;row.scrollLeft-=v;v*=0.93;animId=requestAnimationFrame(step)}
    step();
  });
  row.addEventListener('pointercancel',function(){isDown=false;row.style.cursor='grab'});
}
var _pickLock=false;
function pickCard(idx){
  if(_pickLock)return;_pickLock=true;
  var card=shuffled[idx]||shuffled[0];
  drawnCards.push(card);
  var picker=document.getElementById('pile-picker');
  var label=picker.querySelector('.pile-label');
  var hint=picker.querySelector('.pile-hint');
  label.textContent='已选 '+drawnCards.length+'/12';
  var allCards=document.querySelectorAll('.pile-card');
  allCards.forEach(function(c){if(parseInt(c.dataset.index)===idx){c.classList.add('selected');setTimeout(function(){c.style.display='none'},300)}});
  if(drawnCards.length>=12){
    hint.textContent='选牌完成';
    setTimeout(function(){
      picker.classList.remove('visible');
      document.getElementById('spread-cards').classList.add('visible');
    },600);
  }
  setTimeout(function(){_pickLock=false},500);
}

</script>
</body>
</html>
